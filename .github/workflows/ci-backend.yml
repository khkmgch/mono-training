name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'mono-back/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mono-back/**'
      - '.github/workflows/ci-backend.yml'

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Quarkus)
    runs-on: ubuntu-latest
    # Cancel outdated backend runs for the same branch/PR
    concurrency:
      group: backend-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: mono-back

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn compile -B -q

      - name: Test
        run: mvn test -B
