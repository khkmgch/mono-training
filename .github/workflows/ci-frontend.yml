# test: verify path filter

name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'mono-front/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mono-front/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Svelte)
    runs-on: ubuntu-latest
    # Cancel outdated frontend runs for the same branch/PR
    concurrency:
      group: frontend-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: mono-front

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: mono-front/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: mono-front/package.json
          cache: pnpm
          cache-dependency-path: mono-front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
