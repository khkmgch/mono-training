# CI workflow for mono-training
# Runs on PRs and pushes to main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Quarkus)
    runs-on: ubuntu-latest
    # Cancel outdated backend runs for the same branch/PR
    concurrency:
      group: backend-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: mono-back

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn compile -B -q

      - name: Test
        run: mvn test -B

  frontend:
    name: Frontend (Svelte)
    runs-on: ubuntu-latest
    # Cancel outdated frontend runs for the same branch/PR
    concurrency:
      group: frontend-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: mono-front

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: mono-front/package.json
          cache: pnpm
          cache-dependency-path: mono-front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
